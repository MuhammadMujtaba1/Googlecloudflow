<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowThread | Where work conversations become finished tasks automatically</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hidden { display: none; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased">

<!-- ================= LANDING PAGE ================= -->
<div id="landing">

    <!-- Navbar -->
    <nav class="fixed top-0 z-50 w-full border-b border-slate-200 bg-white/80 backdrop-blur-md">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
            <div class="flex items-center gap-2">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-indigo-600 text-2xl text-white shadow-lg shadow-indigo-200">
                    🧵
                </div>
                <span class="text-xl font-extrabold tracking-tight text-slate-900">FlowThread</span>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="pt-32 pb-20 text-center">
        <h1 class="text-5xl font-extrabold">
            Where work conversations become <span class="gradient-text">finished tasks</span>
        </h1>

        <p class="mt-6 text-slate-600 max-w-2xl mx-auto">
            Chat, manage tasks, and get paid in one place.
        </p>

        <div class="mt-10">
            <button onclick="openApp()" 
                class="rounded-2xl bg-indigo-600 px-8 py-4 text-lg font-bold text-white shadow-xl hover:bg-indigo-700">
                Get Early Access
            </button>
        </div>
    </section>

</div>

<!-- ================= APP / CHAT UI ================= -->
<div id="app" class="hidden min-h-screen flex flex-col">

    <!-- Header -->
    <div class="p-4 bg-white border-b flex justify-between items-center">
        <h2 class="font-bold text-lg">FlowThread AI Chat</h2>
        <button onclick="backToLanding()" class="text-indigo-600 font-semibold">
            ← Back
        </button>
    </div>

    <!-- Chat box -->
    <div class="flex-1 p-4 flex flex-col gap-3">
        <div id="chatBox" class="flex-1 overflow-auto space-y-2"></div>

        <div class="flex gap-2">
            <input id="msg" type="text" placeholder="Type your message..."
                class="flex-1 border p-3 rounded-xl">

            <button onclick="sendMessage()"
                class="bg-indigo-600 text-white px-6 rounded-xl">
                Send
            </button>
        </div>
    </div>

</div>

<script>
function openApp() {
    document.getElementById("landing").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
}

function backToLanding() {
    document.getElementById("app").classList.add("hidden");
    document.getElementById("landing").classList.remove("hidden");
}

async function sendMessage() {
    const input = document.getElementById("msg");
    const chatBox = document.getElementById("chatBox");

    const text = input.value;
    if (!text) return;

    chatBox.innerHTML += `<div><b>You:</b> ${text}</div>`;
    input.value = "";

    const res = await fetch("/api/ai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    const reply =
        data?.candidates?.[0]?.content?.parts?.[0]?.text
        || "No response";

    chatBox.innerHTML += `<div><b>AI:</b> ${reply}</div>`;
}
</script>

</body>
</html>
